# Consul Server 集群部署（V5.2 默认后端）
# 推荐方式：Helm（见下方命令）
# 此 YAML 为原生方式备选

# Helm 安装（推荐）
# helm repo add hashicorp https://helm.releases.hashicorp.com
# helm install consul hashicorp/consul \
#   --namespace higress-system \
#   --create-namespace \
#   --set global.name=consul \
#   --set server.replicas=3 \
#   --set server.storage=1Gi \
#   --set ui.enabled=false \
#   --set connectInject.enabled=false \
#   --set client.enabled=false

---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: consul
  namespace: higress-system
spec:
  serviceName: consul
  replicas: 3
  selector:
    matchLabels:
      app: consul
  template:
    metadata:
      labels:
        app: consul
    spec:
      containers:
      - name: consul
        image: hashicorp/consul:1.17
        env:
        - name: POD_IP
          valueFrom:
            fieldRef:
              fieldPath: status.podIP
        args:
          - agent
          - -server
          - -bootstrap-expect=3
          - -data-dir=/consul/data
          - -bind=0.0.0.0
          - -client=0.0.0.0
          - -advertise=$(POD_IP)
          - -retry-join=consul-0.consul.higress-system.svc.cluster.local
          - -retry-join=consul-1.consul.higress-system.svc.cluster.local
          - -retry-join=consul-2.consul.higress-system.svc.cluster.local
          - -datacenter=dc1
        ports:
        - containerPort: 8300
          name: serflan
        - containerPort: 8301
          name: serfwan
        - containerPort: 8302
          name: server
        - containerPort: 8500
          name: http
        - containerPort: 8600
          name: dns
        resources:
          requests:
            memory: "256Mi"
            cpu: "100m"
          limits:
            memory: "512Mi"
            cpu: "200m"
        volumeMounts:
        - name: data
          mountPath: /consul/data
  volumeClaimTemplates:
  - metadata:
      name: data
    spec:
      accessModes:
      - ReadWriteOnce
      resources:
        requests:
          storage: 1Gi

---
apiVersion: v1
kind: Service
metadata:
  name: consul
  namespace: higress-system
spec:
  clusterIP: None
  selector:
    app: consul
  ports:
  - port: 8300
    targetPort: 8300
    name: serflan

---
apiVersion: v1
kind: Service
metadata:
  name: consul-server
  namespace: higress-system
spec:
  selector:
    app: consul
  ports:
  - port: 8500
    targetPort: 8500
    name: http
  - port: 8300
    targetPort: 8300
    name: serflan
