apiVersion: networking.istio.io/v1beta1
kind: Gateway
metadata:
  name: kimi-router-gateway
  namespace: higress-system
spec:
  selector:
    istio: ingressgateway
  servers:
    - port:
        number: 80
        name: http
        protocol: HTTP
      hosts:
        - "api.kimi-router.example.com"
