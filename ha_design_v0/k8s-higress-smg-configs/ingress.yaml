apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: kimi-router-ingress
  namespace: higress-system
  annotations:
    kubernetes.io/ingress.class: higress
    higress.io/destination: kimi-router-ha-cluster.local
spec:
  rules:
    - host: api.kimi-router.example.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: kimi-router-ha-se
                port:
                  number: 30002
